name: Windows MSVC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: windows-msvc-debug
            cmake_extra: -DHELIOS_DEVELOPER_MODE=ON -DHELIOS_BUILD_EXAMPLES=OFF
          - preset: windows-msvc-release
            cmake_extra: -DHELIOS_BUILD_EXAMPLES=OFF
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore CPM cache
        uses: actions/cache@v4
        with:
          path: .cpm_cache
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/dependencies/**', 'cmake/DownloadUsingCPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.cmake_extra }}

      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (${{ matrix.preset }})
        run: ctest --preset ${{ matrix.preset }}
