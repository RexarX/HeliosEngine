name: macOS Clang

on:
  push:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/macos-clang.yaml"
      - "cmake/**"
      - "examples/**"
      - "src/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "!**.md"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/macos-clang.yaml"
      - "cmake/**"
      - "examples/**"
      - "src/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "!**.md"

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: macos-clang-debug
            cmake_extra: -DHELIOS_DEVELOPER_MODE=ON -DHELIOS_BUILD_EXAMPLES=OFF
          - preset: macos-clang-release
            cmake_extra: -DHELIOS_BUILD_EXAMPLES=OFF
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore CPM cache
        uses: actions/cache@v4
        with:
          path: .cpm_cache
          key: cpm-${{ runner.os }}-${{ hashFiles('cmake/dependencies/**', 'cmake/DownloadUsingCPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Install dependencies
        run: |
          brew install ninja boost spdlog taskflow glfw doctest concurrentqueue

      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.cmake_extra }}

      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (${{ matrix.preset }})
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Diagnose (${{ matrix.preset }})
        if: always()
        run: |
          set +e
          BIN_ROOT="bin/tests"
          echo "### Symbol check: does each binary define its own operator new/delete? ###"
          for f in $(find "$BIN_ROOT" -type f \( -perm -u+x -o -name "*.dylib" \) 2>/dev/null); do
            echo "--- $f ---"
            nm -m "$f" 2>/dev/null | grep -E "__Znwm|__ZdlPv|__ZdlPvm" | sed 's/^/    /'
            if [ -z "$(nm -m "$f" 2>/dev/null | grep -E '__Znwm')" ]; then
              echo "    (no local operator-new override -> uses default libc++ new)"
            fi
          done

          echo ""
          echo "### Re-running each test binary under lldb with malloc corruption guards ###"
          export MallocNanoZone=0
          export MallocScribble=1
          export MallocPreScribble=1
          export MallocGuardEdges=1
          export MallocCheckHeapStart=1
          export MallocCheckHeapEach=1
          export MallocErrorAbort=1
          for f in $(find "$BIN_ROOT" -maxdepth 2 -type f -perm -u+x ! -name "*.dylib" 2>/dev/null); do
            echo "=================================================="
            echo "Running $f"
            echo "=================================================="
            lldb -b -o "run" -o "bt all" -o "quit" -- "$f" 2>&1
            echo ""
          done
        working-directory: ${{ github.workspace }}
