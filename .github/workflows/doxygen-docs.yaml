name: Build and Deploy Doxygen Docs

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*.*.*"
    paths:
      - ".github/workflows/doxygen-docs.yaml"
      - "CMakeLists.txt"
      - "cmake/Doxygen.cmake"
      - "docs/**"
      - "examples/**"
      - "scripts/docs.py"
      - "scripts/edition_selector.py"
      - "scripts/update_docs_version_selector.py"
      - "src/**"
      - "third-party/doxygen-awesome-css/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  doxygen-docs:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve documentation edition
        id: edition
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            label="${GITHUB_REF_NAME#v}"
            if [[ ! "$label" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Unsupported documentation tag: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            destination_dir="$label"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            label="main"
            destination_dir=""
          else
            label="${GITHUB_REF_NAME}"
            destination_dir="branches/${GITHUB_REF_NAME}"
          fi

          echo "label=${label}" >> "$GITHUB_OUTPUT"
          echo "destination_dir=${destination_dir}" >> "$GITHUB_OUTPUT"

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz curl
          # Match local header template (1.17.x); distro packages are often older.
          DOXYGEN_VERSION=1.17.0
          curl -fsSL "https://github.com/doxygen/doxygen/releases/download/Release_1_17_0/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz" \
            -o /tmp/doxygen.tar.gz
          sudo mkdir -p /usr/local/doxygen
          sudo tar -xzf /tmp/doxygen.tar.gz -C /usr/local/doxygen --strip-components=1
          sudo ln -sf /usr/local/doxygen/bin/doxygen /usr/local/bin/doxygen
          doxygen --version

      - name: Ensure jQuery is present (required by doxygen-awesome extensions)
        run: |
          if [ ! -f docs/doxygen/jquery.min.js ]; then
            curl -fsSL https://code.jquery.com/jquery-3.7.1.min.js \
              -o docs/doxygen/jquery.min.js
          fi

      - name: Configure documentation build
        run: cmake --preset docs

      - name: Build Doxygen documentation
        env:
          DOCS_LABEL: ${{ steps.edition.outputs.label }}
        run: cmake --build --preset docs

      - name: Embed multi-edition selector in HTML output
        env:
          DOCS_LABEL: ${{ steps.edition.outputs.label }}
        run: |
          python3 scripts/update_docs_version_selector.py \
            --js-output docs/doxygen/html/edition_selector_data.js \
            --gh-pages-ref origin/gh-pages

      - name: Deploy to GitHub Pages root
        if: steps.edition.outputs.destination_dir == ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/doxygen/html
          publish_branch: gh-pages
          keep_files: true

      - name: Deploy to GitHub Pages edition directory
        if: steps.edition.outputs.destination_dir != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/doxygen/html
          publish_branch: gh-pages
          destination_dir: ${{ steps.edition.outputs.destination_dir }}
          keep_files: true

      - name: Checkout GitHub Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Refresh selector data in all published editions
        run: |
          python3 scripts/update_docs_version_selector.py \
            --refresh-pages-root gh-pages

      - name: Commit refreshed selector data
        working-directory: gh-pages
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Selector data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh documentation edition selector"
          git push origin gh-pages
