name: Build and Deploy Doxygen Docs

on:
  push:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/doxygen-docs.yaml"
      - "CMakeLists.txt"
      - "cmake/Doxygen.cmake"
      - "docs/**"
      - "examples/**"
      - "scripts/docs.py"
      - "scripts/update_docs_version_selector.py"
      - "src/**"
      - "third-party/doxygen-awesome-css/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doxygen-docs:
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz curl
          # Match local header template (1.17.x); distro packages are often older.
          DOXYGEN_VERSION=1.17.0
          curl -fsSL "https://github.com/doxygen/doxygen/releases/download/Release_1_17_0/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz" \
            -o /tmp/doxygen.tar.gz
          sudo mkdir -p /usr/local/doxygen
          sudo tar -xzf /tmp/doxygen.tar.gz -C /usr/local/doxygen --strip-components=1
          sudo ln -sf /usr/local/doxygen/bin/doxygen /usr/local/bin/doxygen
          doxygen --version

      - name: Ensure jQuery is present (required by doxygen-awesome extensions)
        run: |
          if [ ! -f docs/doxygen/jquery.min.js ]; then
            curl -fsSL https://code.jquery.com/jquery-3.7.1.min.js \
              -o docs/doxygen/jquery.min.js
          fi

      - name: Configure documentation build
        run: |
          cmake -B build-docs -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DHELIOS_BUILD_DOCS=ON \
            -DHELIOS_BUILD_TESTS=OFF \
            -DHELIOS_BUILD_EXAMPLES=OFF \
            -DHELIOS_ENABLE_LTO=OFF

      - name: Build Doxygen documentation
        env:
          DOCS_LABEL: ${{ github.ref == 'refs/heads/main' && 'main' || github.ref_name }}
        run: cmake --build build-docs --target helios_docs

      - name: Deploy to GitHub Pages (main → site root)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/doxygen/html
          publish_branch: gh-pages
          keep_files: true

      - name: Deploy to GitHub Pages (other branches → /branches/<branch>/)
        if: github.ref != 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/doxygen/html
          publish_branch: gh-pages
          # GitHub Pages does not serve top-level folders named after common
          # branch names such as "dev" or "main" (they 404 even when present on
          # gh-pages). Use a neutral prefix instead of ${{ github.ref_name }}.
          destination_dir: branches/${{ github.ref_name }}
          keep_files: true

      - name: Update documentation edition selector
        run: |
          python3 scripts/update_docs_version_selector.py \
            --output build/version_selector.html \
            --gh-pages-ref origin/gh-pages

      - name: Deploy edition selector to GitHub Pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build
          publish_branch: gh-pages
          keep_files: true
